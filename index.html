<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekluz Labs - Game Development Studio</title>
    <style>
        :root {
            --primary-gold: #d4af37;
            --akachan-blue: #4facfe;
            --dark-bg: #0f1115;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background: var(--dark-bg);
        }

        header {
            background: rgba(15, 17, 21, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        header nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .nav-logo {
            height: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--primary-gold);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .nav-logo img { height: 100%; border-radius: 4px; }

        header ul { list-style: none; display: flex; gap: 2rem; }

        header a {
            color: white;
            text-decoration: none;
            transition: color 0.3s;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header a:hover { color: var(--primary-gold); }

        .hero {
            padding: 100px 2rem;
            text-align: center;
            background: radial-gradient(circle at center, #1a1e26 0%, #0f1115 100%);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .hero-logo-main {
            width: 180px;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, var(--primary-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: #888;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        section { padding: 80px 0; }

        .game-showcase {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .game-showcase.reverse { direction: rtl; }
        .game-showcase.reverse .game-info { direction: ltr; }

        .game-screenshot-container {
            border-radius: 15px;
            padding: 10px;
            background: linear-gradient(135deg, var(--primary-gold), #222);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .akachan-border { background: linear-gradient(135deg, var(--akachan-blue), #764ba2); }

        .game-screenshot-container img { width: 100%; display: block; border-radius: 10px; }

        .game-info h2 { font-size: 2.5rem; color: var(--primary-gold); margin-bottom: 1.5rem; }
        .akachan-text { color: var(--akachan-blue) !important; }

        .feature-item {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-top: 2rem;
            border-left: 4px solid var(--primary-gold);
        }
        .akachan-item { border-left-color: var(--akachan-blue); }

        .contact-section {
            background: var(--card-bg);
            border: 1px solid var(--primary-gold);
            padding: 4rem;
            border-radius: 20px;
            text-align: center;
        }

        .signup-form {
            display: flex;
            gap: 1rem;
            max-width: 500px;
            margin: 2rem auto;
        }

            flex: 1;
